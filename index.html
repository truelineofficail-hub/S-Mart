<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sneha Mart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="nav">
    <span class="logo">S Mart</span>
  </div>

  <div class="login-container">
    <div class="login-card">
      <h1 class="login-title">Welcome Back</h1>
      
      <form action="#" method="POST">
        <div class="input-group">
          <i class="fa fa-envelope"></i>
          <input type="email" placeholder="Email Address" required>
        </div>
        
        <div class="input-group">
          <i class="fa fa-lock"></i>
          <input type="password" placeholder="Password" required>
        </div>
        
        <button type="submit" class="login-btn">Login</button>
      </form>

      <div class="backend-note">
        I didn't learn backend yet so skip login for now 😔
      </div>
      
      <a href="Home.html" class="skip-btn">Skip for Now</a>
      
      <div class="form-links">
        <a href="#">Forgot Password?</a>
        <br>
        <a href="#">Don't have an account? <b>Sign Up</b></a>
      </div>
    </div>
  </div>

  <div class="footer">
    <h6 class="f1">Copyright 2026 S Mart All rights reserved.</h6>
  </div>
</body>

</html>
